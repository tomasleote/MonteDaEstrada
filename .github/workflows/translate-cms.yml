name: AI Translation — PT → EN

on:
  push:
    branches: [main]
    paths:
      - 'apps/monte-da-estrada/src/data/pt/**'

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to detect changed files

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect changed PT files
        id: changed
        run: |
          # Get list of changed PT JSON files
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'apps/monte-da-estrada/src/data/pt/*.json' | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          if [ -z "$FILES" ]; then
            echo "No PT JSON files changed"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Changed files: $FILES"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Translate changed files
        if: steps.changed.outputs.skip == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          for file in ${{ steps.changed.outputs.files }}; do
            echo "Translating: $file"
            node scripts/translate.mjs "$file"
          done

      - name: Check for translation changes
        if: steps.changed.outputs.skip == 'false'
        id: diff
        run: |
          git diff --quiet apps/monte-da-estrada/src/data/en/ && echo "has_changes=false" >> "$GITHUB_OUTPUT" || echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.diff.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(i18n): auto-translate PT → EN'
          title: '🌐 Auto-translation: PT → EN'
          body: |
            This PR was automatically generated by the AI translation workflow.

            **Changed PT files:**
            ${{ steps.changed.outputs.files }}

            Please review the English translations before merging.
          branch: auto-translate/en-update
          delete-branch: true
          labels: i18n, auto-translation
