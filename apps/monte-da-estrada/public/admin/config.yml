backend:
  name: git-gateway
  branch: main

publish_mode: simple

media_folder: "monte-da-estrada/src/assets/images"
public_folder: "/src/assets/images"

# Internationalization (i18n) — enables PT/EN side-by-side editing
# Structure: multiple_folders creates content/pt/ and content/en/ paths
i18n:
  structure: multiple_folders
  locales:
    - pt
    - en
  default_locale: pt

collections:
  # ─────────────────────────────────────────────
  # HOME PAGE
  # ─────────────────────────────────────────────
  - name: "home"
    label: "Página Inicial"
    i18n: true
    files:
      - label: "Home (PT)"
        name: "home-pt"
        file: "monte-da-estrada/src/data/pt/home.json"
        i18n: true
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            i18n: true
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Subtítulo", name: "subtitle", widget: "string" }
              - { label: "Imagem de Fundo", name: "image", widget: "image" }
              - { label: "Texto Alternativo", name: "alt", widget: "string" }

          - label: "Secção de Boas-vindas"
            name: "welcome"
            widget: "object"
            i18n: true
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - label: "Parágrafos"
                name: "paragraphs"
                widget: "list"
                i18n: true
                field: { label: "Parágrafo", name: "paragraph", widget: "text" }

          - label: "Destaques"
            name: "highlights"
            widget: "list"
            i18n: true
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descrição", name: "description", widget: "text" }

          - label: "Imagens de Destaques"
            name: "featureImages"
            widget: "list"
            min: 3
            max: 4
            i18n: true
            fields:
              - { label: "Imagem", name: "src", widget: "image" }
              - { label: "Texto Alternativo", name: "alt", widget: "string" }
              - { label: "Título", name: "title", widget: "string" }

          - label: "Informações Práticas"
            name: "information"
            widget: "object"
            i18n: true
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Hora de Check-in", name: "checkIn", widget: "string" }
              - { label: "Hora de Check-out", name: "checkOut", widget: "string" }
              - label: "Políticas"
                name: "policies"
                widget: "list"
                i18n: true
                field: { label: "Política", name: "policy", widget: "string" }
              - label: "Incluído"
                name: "included"
                widget: "list"
                i18n: true
                field: { label: "Item", name: "item", widget: "string" }

      - label: "Home (EN)"
        name: "home-en"
        file: "monte-da-estrada/src/data/en/home.json"
        i18n: true
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            i18n: true
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Background Image", name: "image", widget: "image" }
              - { label: "Image Alt Text", name: "alt", widget: "string" }

          - label: "Welcome Section"
            name: "welcome"
            widget: "object"
            i18n: true
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - label: "Paragraphs"
                name: "paragraphs"
                widget: "list"
                i18n: true
                field: { label: "Paragraph", name: "paragraph", widget: "text" }

          - label: "Highlights"
            name: "highlights"
            widget: "list"
            i18n: true
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

          - label: "Feature Images"
            name: "featureImages"
            widget: "list"
            min: 3
            max: 4
            i18n: true
            fields:
              - { label: "Image", name: "src", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }

          - label: "Practical Information"
            name: "information"
            widget: "object"
            i18n: true
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Check-in Time", name: "checkIn", widget: "string" }
              - { label: "Check-out Time", name: "checkOut", widget: "string" }
              - label: "Policies"
                name: "policies"
                widget: "list"
                i18n: true
                field: { label: "Policy", name: "policy", widget: "string" }
              - label: "Included"
                name: "included"
                widget: "list"
                i18n: true
                field: { label: "Item", name: "item", widget: "string" }

  # ─────────────────────────────────────────────
  # QUARTOS PAGE
  # ─────────────────────────────────────────────
  - name: "quartos"
    label: "Quartos"
    i18n: true
    files:
      - label: "Quartos (PT)"
        name: "quartos-pt"
        file: "monte-da-estrada/src/data/pt/quartos.json"
        i18n: true
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            i18n: true
            fields:
              - { label: "Imagem", name: "image", widget: "image" }
              - { label: "Texto Alternativo", name: "alt", widget: "string" }
              - { label: "Título", name: "title", widget: "string" }

          - { label: "Título", name: "title", widget: "string" }
          - { label: "Descrição", name: "description", widget: "text" }

          - label: "Quartos"
            name: "rooms"
            widget: "list"
            i18n: true
            fields:
              - { label: "Nome do Quarto", name: "name", widget: "string" }
              - { label: "Capacidade", name: "capacity", widget: "string" }
              - label: "Características"
                name: "features"
                widget: "list"
                i18n: true
                field: { label: "Característica", name: "feature", widget: "string" }
              - label: "Imagens do Quarto"
                name: "images"
                widget: "list"
                i18n: true
                field: { label: "Imagem", name: "image", widget: "image" }
              - label: "Textos Alternativos"
                name: "imageAlts"
                widget: "list"
                i18n: true
                field: { label: "Texto Alternativo", name: "alt", widget: "string" }

          - label: "Preços e Reservas"
            name: "pricing"
            widget: "object"
            i18n: true
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descrição", name: "description", widget: "text" }
              - label: "Épocas"
                name: "seasons"
                widget: "list"
                i18n: true
                fields:
                  - { label: "Nome da Época", name: "name", widget: "string" }
                  - { label: "Período", name: "period", widget: "string" }
                  - { label: "Nota", name: "note", widget: "string" }
              - label: "Políticas"
                name: "policies"
                widget: "list"
                i18n: true
                field: { label: "Política", name: "policy", widget: "string" }

          - label: "Comodidades"
            name: "facilities"
            widget: "list"
            i18n: true
            field: { label: "Comodidade", name: "facility", widget: "string" }

      - label: "Rooms (EN)"
        name: "quartos-en"
        file: "monte-da-estrada/src/data/en/quartos.json"
        i18n: true
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            i18n: true
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }

          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }

          - label: "Rooms"
            name: "rooms"
            widget: "list"
            i18n: true
            fields:
              - { label: "Room Name", name: "name", widget: "string" }
              - { label: "Capacity", name: "capacity", widget: "string" }
              - label: "Features"
                name: "features"
                widget: "list"
                i18n: true
                field: { label: "Feature", name: "feature", widget: "string" }
              - label: "Room Images"
                name: "images"
                widget: "list"
                i18n: true
                field: { label: "Image", name: "image", widget: "image" }
              - label: "Image Alt Texts"
                name: "imageAlts"
                widget: "list"
                i18n: true
                field: { label: "Alt Text", name: "alt", widget: "string" }

          - label: "Prices and Reservations"
            name: "pricing"
            widget: "object"
            i18n: true
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Seasons"
                name: "seasons"
                widget: "list"
                i18n: true
                fields:
                  - { label: "Season Name", name: "name", widget: "string" }
                  - { label: "Period", name: "period", widget: "string" }
                  - { label: "Note", name: "note", widget: "string" }
              - label: "Policies"
                name: "policies"
                widget: "list"
                i18n: true
                field: { label: "Policy", name: "policy", widget: "string" }

          - label: "Facilities"
            name: "facilities"
            widget: "list"
            i18n: true
            field: { label: "Facility", name: "facility", widget: "string" }

  # ─────────────────────────────────────────────
  # GALERIA PAGE
  # ─────────────────────────────────────────────
  - name: "galeria"
    label: "Galeria"
    i18n: true
    files:
      - label: "Galeria (PT)"
        name: "galeria-pt"
        file: "monte-da-estrada/src/data/pt/galeria.json"
        i18n: true
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            i18n: true
            fields:
              - { label: "Imagem", name: "image", widget: "image" }
              - { label: "Texto Alternativo", name: "alt", widget: "string" }
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Subtítulo", name: "subtitle", widget: "string" }

          - { label: "Título", name: "title", widget: "string" }
          - { label: "Descrição", name: "description", widget: "text" }

          - label: "Categorias"
            name: "categories"
            widget: "list"
            i18n: true
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Nome", name: "name", widget: "string" }
              - { label: "Descrição", name: "description", widget: "text" }
              - label: "Imagens"
                name: "images"
                widget: "list"
                i18n: true
                fields:
                  - { label: "Imagem", name: "src", widget: "image" }
                  - { label: "Miniatura", name: "thumbnail", widget: "image", required: false }
                  - { label: "Texto Alternativo", name: "alt", widget: "string" }
                  - { label: "Legenda", name: "caption", widget: "string" }

          - label: "Informações sobre Fotografia"
            name: "photographyInfo"
            widget: "object"
            i18n: true
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descrição", name: "description", widget: "text" }
              - label: "Créditos"
                name: "credits"
                widget: "list"
                i18n: true
                field: { label: "Crédito", name: "credit", widget: "string" }

      - label: "Gallery (EN)"
        name: "galeria-en"
        file: "monte-da-estrada/src/data/en/galeria.json"
        i18n: true
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            i18n: true
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }

          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }

          - label: "Categories"
            name: "categories"
            widget: "list"
            i18n: true
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Images"
                name: "images"
                widget: "list"
                i18n: true
                fields:
                  - { label: "Image", name: "src", widget: "image" }
                  - { label: "Thumbnail", name: "thumbnail", widget: "image", required: false }
                  - { label: "Alt Text", name: "alt", widget: "string" }
                  - { label: "Caption", name: "caption", widget: "string" }

          - label: "Photography Info"
            name: "photographyInfo"
            widget: "object"
            i18n: true
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Credits"
                name: "credits"
                widget: "list"
                i18n: true
                field: { label: "Credit", name: "credit", widget: "string" }

  # ─────────────────────────────────────────────
  # DESCOBRIR PAGE
  # ─────────────────────────────────────────────
  - name: "descobrir"
    label: "Descobrir"
    i18n: true
    files:
      - label: "Descobrir (PT)"
        name: "descobrir-pt"
        file: "monte-da-estrada/src/data/pt/descobrir.json"
        i18n: true
        fields:
          - label: "Experiências"
            name: "experiences"
            widget: "list"
            i18n: true
            fields:
              - { label: "Categoria", name: "category", widget: "string" }
              - { label: "Nome da Categoria", name: "categoryLabel", widget: "string" }
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descrição", name: "description", widget: "text" }
              - label: "Destaques"
                name: "highlights"
                widget: "list"
                i18n: true
                field: { label: "Destaque", name: "highlight", widget: "string" }
              - { label: "Imagem", name: "imageSrc", widget: "image" }
              - { label: "Texto Alternativo", name: "imageAlt", widget: "string" }

          - label: "Praias"
            name: "beaches"
            widget: "list"
            i18n: true
            fields:
              - { label: "Nome", name: "name", widget: "string" }
              - { label: "Distância", name: "distance", widget: "string" }
              - { label: "Descrição", name: "description", widget: "text" }
              - { label: "Imagem", name: "imageSrc", widget: "image" }
              - { label: "Texto Alternativo", name: "imageAlt", widget: "string" }
              - { label: "URL do Mapa", name: "mapUrl", widget: "string" }

          - label: "Atrações"
            name: "attractions"
            widget: "list"
            i18n: true
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Localização", name: "location", widget: "string" }
              - { label: "Distância", name: "distance", widget: "string" }
              - { label: "Descrição", name: "description", widget: "text" }
              - { label: "Imagem", name: "imageSrc", widget: "image" }
              - { label: "Texto Alternativo", name: "imageAlt", widget: "string" }
              - { label: "URL do Mapa", name: "mapUrl", widget: "string" }

          - label: "Parceiros"
            name: "parceiros"
            widget: "list"
            i18n: true
            fields:
              - { label: "Nome", name: "name", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Logotipo", name: "logo", widget: "image" }

      - label: "Discover (EN)"
        name: "descobrir-en"
        file: "monte-da-estrada/src/data/en/descobrir.json"
        i18n: true
        fields:
          - label: "Experiences"
            name: "experiences"
            widget: "list"
            i18n: true
            fields:
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Category Label", name: "categoryLabel", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Highlights"
                name: "highlights"
                widget: "list"
                i18n: true
                field: { label: "Highlight", name: "highlight", widget: "string" }
              - { label: "Image", name: "imageSrc", widget: "image" }
              - { label: "Alt Text", name: "imageAlt", widget: "string" }

          - label: "Beaches"
            name: "beaches"
            widget: "list"
            i18n: true
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Distance", name: "distance", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "imageSrc", widget: "image" }
              - { label: "Alt Text", name: "imageAlt", widget: "string" }
              - { label: "Map URL", name: "mapUrl", widget: "string" }

          - label: "Attractions"
            name: "attractions"
            widget: "list"
            i18n: true
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Distance", name: "distance", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "imageSrc", widget: "image" }
              - { label: "Alt Text", name: "imageAlt", widget: "string" }
              - { label: "Map URL", name: "mapUrl", widget: "string" }

          - label: "Partners"
            name: "parceiros"
            widget: "list"
            i18n: true
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Logo", name: "logo", widget: "image" }

  # ─────────────────────────────────────────────
  # SUITE ALENTEJANA
  # ─────────────────────────────────────────────
  - name: "suiteAlentejana"
    label: "Suite Alentejana"
    i18n: true
    files:
      - label: "Suite Alentejana (PT)"
        name: "suiteAlentejana-pt"
        file: "monte-da-estrada/src/data/pt/suiteAlentejana.json"
        i18n: true
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Descrição", name: "description", widget: "text" }
          - { label: "CTA Label", name: "ctaLabel", widget: "string" }
          - { label: "CTA URL", name: "ctaHref", widget: "string" }
          - label: "Comodidades"
            name: "amenities"
            widget: "list"
            i18n: true
            field: { label: "Comodidade", name: "amenity", widget: "string" }

      - label: "Suite Alentejana (EN)"
        name: "suiteAlentejana-en"
        file: "monte-da-estrada/src/data/en/suiteAlentejana.json"
        i18n: true
        fields:
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "CTA Label", name: "ctaLabel", widget: "string" }
          - { label: "CTA URL", name: "ctaHref", widget: "string" }
          - label: "Amenities"
            name: "amenities"
            widget: "list"
            i18n: true
            field: { label: "Amenity", name: "amenity", widget: "string" }

  # ─────────────────────────────────────────────
  # SITE SETTINGS — global branding, logos, SEO
  # ─────────────────────────────────────────────
  - name: "site_settings"
    label: "Configurações do Site"
    i18n: true
    files:
      - label: "Site Settings (PT)"
        name: "settings-pt"
        file: "monte-da-estrada/src/data/pt/site-settings.json"
        i18n: true
        fields:
          - { label: "Nome da Marca", name: "brandName", widget: "string", default: "Monte da Estrada" }
          - { label: "Logotipo do Site", name: "siteLogo", widget: "image" }
          - { label: "Texto Alternativo do Logotipo", name: "siteLogoAlt", widget: "string" }
          - label: "Logotipos de Parceiros"
            name: "partnerLogos"
            widget: "list"
            i18n: true
            fields:
              - { label: "Nome do Parceiro", name: "name", widget: "string" }
              - { label: "Logotipo", name: "logo", widget: "image" }
              - { label: "Texto Alternativo", name: "alt", widget: "string" }
              - { label: "URL (opcional)", name: "url", widget: "string" }
          - { label: "Favicon", name: "favicon", widget: "image" }
          - { label: "Meta Imagem (partilha social)", name: "metaImage", widget: "image" }
          - { label: "Texto Alternativo da Meta Imagem", name: "metaImageAlt", widget: "string" }
          - { label: "URL do Botão de Reservas", name: "reservasUrl", widget: "string" }
          - { label: "Mostrar Seletor de Língua", name: "showLanguageSelector", widget: "boolean", default: true }

      - label: "Site Settings (EN)"
        name: "settings-en"
        file: "monte-da-estrada/src/data/en/site-settings.json"
        i18n: true
        fields:
          - { label: "Brand Name", name: "brandName", widget: "string", default: "Monte da Estrada" }
          - { label: "Site Logo", name: "siteLogo", widget: "image" }
          - { label: "Logo Alt Text", name: "siteLogoAlt", widget: "string" }
          - label: "Partner Logos"
            name: "partnerLogos"
            widget: "list"
            i18n: true
            fields:
              - { label: "Partner Name", name: "name", widget: "string" }
              - { label: "Logo", name: "logo", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }
              - { label: "URL (optional)", name: "url", widget: "string" }
          - { label: "Favicon", name: "favicon", widget: "image" }
          - { label: "Meta Image (social sharing)", name: "metaImage", widget: "image" }
          - { label: "Meta Image Alt Text", name: "metaImageAlt", widget: "string" }
          - { label: "Booking Button URL", name: "reservasUrl", widget: "string" }
          - { label: "Show Language Selector", name: "showLanguageSelector", widget: "boolean", default: true }

  # ─────────────────────────────────────────────
  # ATIVIDADES PAGE
  # ─────────────────────────────────────────────
  - name: "atividades"
    label: "Atividades"
    i18n: true
    files:
      - label: "Atividades (PT)"
        name: "atividades-pt"
        file: "monte-da-estrada/src/data/pt/atividades.json"
        i18n: true
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            i18n: true
            fields:
              - { label: "Imagem", name: "image", widget: "image" }
              - { label: "Texto Alternativo", name: "alt", widget: "string" }
              - { label: "Título", name: "title", widget: "string" }

          - { label: "Título", name: "title", widget: "string" }
