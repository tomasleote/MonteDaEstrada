# Netlify Build Configuration for Monte da Estrada
# This configuration defines how Netlify should build and deploy the site

[build]
  # Build command - navigate to project directory, install dependencies, and build
  # Using --legacy-peer-deps due to React 19 compatibility with netlify-cms-app
  command = "cd apps/monte-da-estrada && npm install --legacy-peer-deps && npm run build"

  # Directory to publish after build (relative to repository root)
  publish = "apps/monte-da-estrada/dist"

  # Node version to use for builds
  [build.environment]
    NODE_VERSION = "18"

# Redirect rules for SPA (Single Page Application) routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Admin panel redirect - ensure /admin serves the Decap CMS admin UI
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://be.heytravel.net https://identity.netlify.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://be.heytravel.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://cdn.jsdelivr.net https://tile.openstreetmap.org https://be.heytravel.net; connect-src 'self' https://be.heytravel.net;"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets for better performance
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

