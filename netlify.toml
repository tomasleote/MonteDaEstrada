# Netlify Build Configuration for Monte da Estrada
# This configuration defines how Netlify should build and deploy the site

[build]
  # Build command - navigate to project directory, install dependencies, and build
  command = "cd monte-da-estrada && npm install && npm run build"

  # Directory to publish after build (relative to repository root)
  publish = "monte-da-estrada/dist"

  # Node version to use for builds
  [build.environment]
    NODE_VERSION = "18"

# Redirect rules for SPA (Single Page Application) routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  # Don't apply this redirect to files that actually exist
  conditions = {Role = ["admin"], Country = ["US"]}
  force = false

# Admin panel redirect - ensure /admin serves the Decap CMS admin UI
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets for better performance
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

